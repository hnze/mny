<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>생활비 가계부</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F4F4F4;
  --card: #FFFFFF;
  --text: #111111;
  --sub: #888888;
  --hint: #BBBBBB;
  --point: #0ECA72;
  --point-light: #E8FAF2;
  --point-dark: #0AAF62;
  --border: #EEEEEE;
  --danger: #FF5A5A;
  --danger-light: #FFF0F0;
  --nav-h: 72px;
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  font-size: 16px;
  letter-spacing: -0.02em;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: var(--nav-h);
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: var(--nav-h);
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  letter-spacing: -0.02em;
  color: var(--hint);
  font-size: 11px;
  transition: color 0.2s;
  padding-bottom: 4px;
}
.nav-item.active { color: var(--point); }
.nav-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-icon svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* PAGE */
.page { display: none; padding: 0 0 24px; }
.page.active { display: block; }

/* HEADER */
.header {
  background: var(--card);
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid var(--border);
}
.header-title { font-size: 18px; font-weight: 600; }
.header-month {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
}
.month-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: background 0.15s;
}
.month-btn:active { background: var(--border); }

/* CARD */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin: 12px 16px 0;
}
.card-sm {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 16px 0;
}

/* HOME PAGE */
.home-summary {
  background: var(--card);
  padding: 24px 20px 20px;
  margin: 12px 16px 0;
  border-radius: var(--radius);
}
.summary-label { font-size: 13px; color: var(--sub); margin-bottom: 6px; }
.summary-amount { font-size: 32px; font-weight: 700; letter-spacing: -0.04em; }
.summary-amount span { font-size: 18px; font-weight: 500; margin-left: 2px; }
.summary-sub { font-size: 13px; color: var(--sub); margin-top: 6px; }
.summary-sub b { color: var(--text); font-weight: 600; }

.section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--sub);
  padding: 20px 20px 0;
  letter-spacing: -0.02em;
}

.budget-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin: 10px 16px 0;
}
.budget-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.budget-cat {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.budget-cat-name { font-size: 15px; font-weight: 600; }
.budget-amounts {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.budget-spent { font-size: 17px; font-weight: 700; }
.budget-total { font-size: 13px; color: var(--sub); }
.progress-bar {
  height: 6px;
  background: var(--bg);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.budget-remain { font-size: 13px; color: var(--sub); text-align: right; }
.budget-remain b { font-weight: 600; }
.budget-over { color: var(--danger); }

/* HISTORY PAGE */
.tab-row {
  display: flex;
  gap: 8px;
  padding: 16px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-row::-webkit-scrollbar { display: none; }
.tab-pill {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 14px;
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.02em;
  transition: all 0.15s;
}
.tab-pill.active {
  background: var(--point);
  border-color: var(--point);
  color: #fff;
}

.add-btn-wrap {
  padding: 12px 16px 0;
}
.add-btn {
  width: 100%;
  padding: 15px;
  background: var(--point);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: -0.02em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s;
}
.add-btn:active { background: var(--point-dark); }

.expense-list { padding: 0 16px; }
.expense-date-group { margin-top: 20px; }
.expense-date-label {
  font-size: 13px;
  color: var(--sub);
  font-weight: 500;
  margin-bottom: 8px;
  padding: 0 4px;
}
.expense-item {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.expense-cat-badge {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.expense-info { flex: 1; min-width: 0; }
.expense-item-name {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.expense-store { font-size: 13px; color: var(--sub); margin-top: 2px; }
.expense-amount { font-size: 15px; font-weight: 700; flex-shrink: 0; }
.expense-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.expense-action-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: -0.02em;
}
.btn-edit { background: var(--bg); color: var(--text); }
.btn-delete { background: var(--danger-light); color: var(--danger); }
.expense-item.expanded { flex-wrap: wrap; }
.expense-item.expanded .expense-actions { width: 100%; }
.expense-memo { font-size: 13px; color: var(--sub); margin-top: 4px; }

.empty-state {
  text-align: center;
  padding: 48px 0;
  color: var(--hint);
}
.empty-state p { font-size: 15px; margin-top: 12px; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 430px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  margin: 0 auto 20px;
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }

.form-group { margin-bottom: 20px; }
.form-label { font-size: 13px; color: var(--sub); font-weight: 500; margin-bottom: 8px; display: block; }
.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-family: inherit;
  letter-spacing: -0.02em;
  color: var(--text);
  background: var(--card);
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--point); }

.cat-select-row {
  display: flex;
  gap: 8px;
}
.cat-select-btn {
  flex: 1;
  padding: 12px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  letter-spacing: -0.02em;
  color: var(--sub);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.cat-select-btn.active {
  border-color: var(--point);
  color: var(--point);
  background: var(--point-light);
}

.form-submit {
  width: 100%;
  padding: 16px;
  background: var(--point);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: -0.02em;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}
.form-submit:active { background: var(--point-dark); }

/* STATS PAGE */
.stats-month-total {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 16px 0;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
}
.stat-label { font-size: 13px; color: var(--sub); margin-bottom: 6px; }
.stat-value { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; }

.bar-chart {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin: 12px 16px 0;
}
.bar-chart-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
.bar-item {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.bar-label { font-size: 13px; color: var(--sub); width: 48px; flex-shrink: 0; }
.bar-wrap { flex: 1; height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
.bar-amount { font-size: 13px; font-weight: 600; width: 64px; text-align: right; flex-shrink: 0; }

.monthly-list {
  background: var(--card);
  border-radius: var(--radius);
  margin: 12px 16px 0;
  overflow: hidden;
}
.monthly-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.monthly-item:last-child { border-bottom: none; }
.monthly-item-left { display: flex; align-items: center; gap: 12px; }
.monthly-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--point); }
.monthly-name { font-size: 15px; font-weight: 500; }
.monthly-count { font-size: 13px; color: var(--sub); margin-top: 2px; }
.monthly-amount { font-size: 16px; font-weight: 700; }

/* SETTINGS PAGE */
.settings-section {
  margin: 12px 16px 0;
}
.settings-title { font-size: 13px; color: var(--sub); font-weight: 500; padding: 0 4px; margin-bottom: 8px; }
.settings-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-row-left { display: flex; flex-direction: column; gap: 3px; }
.settings-row-name { font-size: 16px; font-weight: 500; }
.settings-row-sub { font-size: 13px; color: var(--sub); }
.settings-amount-input {
  width: 110px;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: -0.02em;
  color: var(--text);
  background: var(--bg);
  outline: none;
  text-align: right;
  transition: border-color 0.15s;
}
.settings-amount-input:focus { border-color: var(--point); background: var(--card); }
.settings-save-btn {
  width: calc(100% - 32px);
  margin: 16px;
  padding: 15px;
  background: var(--point);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: -0.02em;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-save-btn:active { background: var(--point-dark); }

/* TOAST */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #111;
  color: #fff;
  padding: 12px 20px;
  border-radius: 99px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.02em;
  opacity: 0;
  transition: all 0.25s;
  z-index: 300;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* CONFIRM MODAL */
.confirm-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.confirm-modal.open { display: flex; }
.confirm-box {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 24px 20px;
  width: 100%;
  max-width: 320px;
}
.confirm-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.confirm-desc { font-size: 14px; color: var(--sub); line-height: 1.6; margin-bottom: 24px; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: -0.02em;
}
.confirm-cancel { background: var(--bg); color: var(--text); }
.confirm-ok { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="header">
    <div class="header-month">
      <button class="month-btn" onclick="changeMonth(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <span id="home-month-label">2025년 6월</span>
      <button class="month-btn" onclick="changeMonth(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9,18 15,12 9,6"/></svg>
      </button>
    </div>
  </div>

  <div class="home-summary card" style="margin-top:16px">
    <div class="summary-label">이번 달 총 지출</div>
    <div class="summary-amount" id="home-total">0<span>원</span></div>
    <div class="summary-sub" id="home-budget-remain"></div>
  </div>

  <div class="section-title">카테고리별 예산</div>
  <div id="home-budget-list"></div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="header">
    <div class="header-month">
      <button class="month-btn" onclick="changeMonth(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <span id="history-month-label">2025년 6월</span>
      <button class="month-btn" onclick="changeMonth(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9,18 15,12 9,6"/></svg>
      </button>
    </div>
  </div>

  <div class="tab-row" id="history-tabs">
    <button class="tab-pill active" onclick="filterCat('전체')">전체</button>
    <button class="tab-pill" onclick="filterCat('생필품')">생필품</button>
    <button class="tab-pill" onclick="filterCat('쇼핑')">쇼핑</button>
    <button class="tab-pill" onclick="filterCat('식료품')">식료품</button>
  </div>

  <div class="add-btn-wrap">
    <button class="add-btn" onclick="openAddModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      지출 추가
    </button>
  </div>

  <div class="expense-list" id="expense-list"></div>
</div>

<!-- STATS -->
<div class="page" id="page-stats">
  <div class="header">
    <div class="header-month">
      <button class="month-btn" onclick="changeMonth(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <span id="stats-month-label">2025년 6월</span>
      <button class="month-btn" onclick="changeMonth(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9,18 15,12 9,6"/></svg>
      </button>
    </div>
  </div>
  <div id="stats-content"></div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="header">
    <div class="header-title">설정</div>
  </div>

  <div class="settings-section">
    <div class="settings-title">카테고리별 예산 설정</div>
    <div class="settings-card">
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-row-name">생필품</div>
          <div class="settings-row-sub">매월 초기화</div>
        </div>
        <input class="settings-amount-input" type="number" id="budget-생필품" placeholder="80000">
      </div>
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-row-name">쇼핑</div>
          <div class="settings-row-sub">매월 초기화</div>
        </div>
        <input class="settings-amount-input" type="number" id="budget-쇼핑" placeholder="100000">
      </div>
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-row-name">식료품</div>
          <div class="settings-row-sub">매월 초기화</div>
        </div>
        <input class="settings-amount-input" type="number" id="budget-식료품" placeholder="100000">
      </div>
    </div>
    <button class="settings-save-btn" onclick="saveBudgets()">저장하기</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-item active" onclick="goPage('home',this)">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9,21 9,12 15,12 15,21"/></svg>
    </div>
    홈
  </button>
  <button class="nav-item" onclick="goPage('history',this)">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-linecap="round" stroke-width="2.5"/><line x1="12" y1="14" x2="12" y2="14" stroke-linecap="round" stroke-width="2.5"/><line x1="16" y1="14" x2="16" y2="14" stroke-linecap="round" stroke-width="2.5"/></svg>
    </div>
    내역
  </button>
  <button class="nav-item" onclick="goPage('stats',this)">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </div>
    통계
  </button>
  <button class="nav-item" onclick="goPage('settings',this)">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </div>
    설정
  </button>
</nav>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">지출 추가</div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input class="form-input" type="date" id="form-date">
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="cat-select-row">
        <button class="cat-select-btn active" onclick="selectCat('생필품',this)">생필품</button>
        <button class="cat-select-btn" onclick="selectCat('쇼핑',this)">쇼핑</button>
        <button class="cat-select-btn" onclick="selectCat('식료품',this)">식료품</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">구매처</label>
      <input class="form-input" type="text" id="form-store" placeholder="예) 쿠팡, 이마트">
    </div>
    <div class="form-group">
      <label class="form-label">물품명</label>
      <input class="form-input" type="text" id="form-item" placeholder="예) 샴푸, 청바지">
    </div>
    <div class="form-group">
      <label class="form-label">금액</label>
      <input class="form-input" type="number" id="form-amount" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">메모 <span style="color:var(--hint);font-weight:400">(선택)</span></label>
      <input class="form-input" type="text" id="form-memo" placeholder="간단한 메모">
    </div>
    <button class="form-submit" id="form-submit-btn" onclick="submitExpense()">저장하기</button>
    <button onclick="closeModal()" style="width:100%;padding:14px;background:none;border:none;font-size:15px;color:var(--sub);font-family:inherit;letter-spacing:-0.02em;cursor:pointer;margin-top:4px;">취소</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-modal" id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-title">지출을 삭제할까요?</div>
    <div class="confirm-desc">삭제한 내역은 복구할 수 없어요.</div>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-btn confirm-ok" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhqBIdwnKr_-Wpy72t1TjdB9A-Mh41yHbjvyMbICTLAZrDqlWG_PEq9JNRIwmVuGA/exec';

const CAT_COLORS = {
  '생필품': { bg: '#EEF6FF', text: '#3B82F6', dot: '#3B82F6' },
  '쇼핑':   { bg: '#FFF3EE', text: '#F97316', dot: '#F97316' },
  '식료품': { bg: '#EFFDF4', text: '#0ECA72', dot: '#0ECA72' },
};

let currentMonth = new Date();
currentMonth.setDate(1);
let expenses = [];
let budgets = { '생필품': 80000, '쇼핑': 100000, '식료품': 100000 };
let filterCatActive = '전체';
let editingId = null;
let deletingId = null;
let selectedCat = '생필품';

// INIT
async function init() {
  updateMonthLabels();
  loadFromLocal();
  renderAll();
  try {
    const [expData, budData] = await Promise.all([fetchExpenses(), fetchBudgets()]);
    if (expData) expenses = expData;
    if (budData) budgets = budData;
    saveToLocal();
    renderAll();
  } catch(e) {}
}

function loadFromLocal() {
  try {
    const e = localStorage.getItem('expenses');
    const b = localStorage.getItem('budgets');
    if (e) expenses = JSON.parse(e);
    if (b) budgets = JSON.parse(b);
  } catch(e) {}
}

function saveToLocal() {
  localStorage.setItem('expenses', JSON.stringify(expenses));
  localStorage.setItem('budgets', JSON.stringify(budgets));
}

// API
async function fetchExpenses() {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getExpenses' })
  });
  const data = await res.json();
  if (data.success) return data.data.map(r => ({
    id: r['ID'], date: r['날짜'], category: r['카테고리'],
    store: r['구매처'], item: r['물품명'],
    amount: Number(r['금액']), memo: r['메모'] || ''
  }));
  return null;
}

async function fetchBudgets() {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getBudget' })
  });
  const data = await res.json();
  if (data.success && data.data.length > 0) {
    const b = {};
    data.data.forEach(r => { b[r.category] = Number(r.amount); });
    return b;
  }
  return null;
}

async function apiAddExpense(exp) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'addExpense', ...exp })
  });
  return await res.json();
}

async function apiUpdateExpense(exp) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'updateExpense', ...exp })
  });
  return await res.json();
}

async function apiDeleteExpense(id) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'deleteExpense', id })
  });
  return await res.json();
}

async function apiSaveBudget(budgets) {
  const arr = Object.entries(budgets).map(([category, amount]) => ({ category, amount }));
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'saveBudget', budgets: arr })
  });
  return await res.json();
}

// MONTH
function getMonthKey() {
  return `${currentMonth.getFullYear()}-${String(currentMonth.getMonth()+1).padStart(2,'0')}`;
}

function getMonthLabel() {
  return `${currentMonth.getFullYear()}년 ${currentMonth.getMonth()+1}월`;
}

function updateMonthLabels() {
  const l = getMonthLabel();
  document.getElementById('home-month-label').textContent = l;
  document.getElementById('history-month-label').textContent = l;
  document.getElementById('stats-month-label').textContent = l;
}

function changeMonth(d) {
  currentMonth.setMonth(currentMonth.getMonth() + d);
  updateMonthLabels();
  renderAll();
}

function getMonthExpenses() {
  const key = getMonthKey();
  return expenses.filter(e => e.date && e.date.startsWith(key));
}

// RENDER ALL
function renderAll() {
  renderHome();
  renderHistory();
  renderStats();
  renderSettings();
}

// HOME
function renderHome() {
  const me = getMonthExpenses();
  const total = me.reduce((s, e) => s + e.amount, 0);
  const totalBudget = Object.values(budgets).reduce((a, b) => a + b, 0);
  const remain = totalBudget - total;

  document.getElementById('home-total').innerHTML = `${total.toLocaleString()}<span>원</span>`;
  const remEl = document.getElementById('home-budget-remain');
  if (remain >= 0) {
    remEl.innerHTML = `총 예산 ${totalBudget.toLocaleString()}원 중 <b>${remain.toLocaleString()}원</b> 남음`;
  } else {
    remEl.innerHTML = `<span style="color:var(--danger)">예산 ${Math.abs(remain).toLocaleString()}원 초과</span>`;
  }

  const list = document.getElementById('home-budget-list');
  list.innerHTML = ['생필품','쇼핑','식료품'].map(cat => {
    const spent = me.filter(e => e.category === cat).reduce((s, e) => s + e.amount, 0);
    const budget = budgets[cat] || 0;
    const pct = budget > 0 ? Math.min(spent / budget * 100, 100) : 0;
    const over = spent > budget;
    const col = CAT_COLORS[cat];
    return `
    <div class="budget-card">
      <div class="budget-card-header">
        <div class="budget-cat">
          <div class="cat-dot" style="background:${col.dot}"></div>
          <div class="budget-cat-name">${cat}</div>
        </div>
        <div class="budget-amounts">
          <div class="budget-spent" style="color:${over ? 'var(--danger)' : 'var(--text)'}">${spent.toLocaleString()}</div>
          <div class="budget-total">/ ${budget.toLocaleString()}원</div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:${over ? 'var(--danger)' : col.dot}"></div>
      </div>
      <div class="budget-remain ${over ? 'budget-over' : ''}">
        ${over ? `<b>${(spent-budget).toLocaleString()}원</b> 초과` : `<b>${(budget-spent).toLocaleString()}원</b> 남음`}
      </div>
    </div>`;
  }).join('');
}

// HISTORY
function renderHistory() {
  const tabs = document.querySelectorAll('.tab-pill');
  tabs.forEach(t => {
    t.classList.toggle('active', t.textContent === filterCatActive);
  });

  let me = getMonthExpenses();
  if (filterCatActive !== '전체') me = me.filter(e => e.category === filterCatActive);
  me = [...me].sort((a, b) => b.date.localeCompare(a.date));

  const list = document.getElementById('expense-list');
  if (me.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--hint)" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <p>이번 달 내역이 없어요</p>
    </div>`;
    return;
  }

  const grouped = {};
  me.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });

  list.innerHTML = Object.entries(grouped).sort((a,b) => b[0].localeCompare(a[0])).map(([date, items]) => {
    const d = new Date(date + 'T00:00:00');
    const dayLabel = `${d.getMonth()+1}월 ${d.getDate()}일 ${['일','월','화','수','목','금','토'][d.getDay()]}요일`;
    return `<div class="expense-date-group">
      <div class="expense-date-label">${dayLabel}</div>
      ${items.map(e => {
        const col = CAT_COLORS[e.category];
        return `<div class="expense-item" id="ei-${e.id}" onclick="toggleExpense('${e.id}')">
          <div class="expense-cat-badge" style="background:${col.bg};color:${col.text}">${e.category[0]}</div>
          <div class="expense-info">
            <div class="expense-item-name">${e.item}</div>
            <div class="expense-store">${e.store}${e.memo ? ' · ' + e.memo : ''}</div>
          </div>
          <div class="expense-amount">-${e.amount.toLocaleString()}원</div>
          <div class="expense-actions" style="display:none">
            <button class="expense-action-btn btn-edit" onclick="event.stopPropagation();openEditModal('${e.id}')">수정</button>
            <button class="expense-action-btn btn-delete" onclick="event.stopPropagation();askDelete('${e.id}')">삭제</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function toggleExpense(id) {
  const el = document.getElementById('ei-' + id);
  if (!el) return;
  const actions = el.querySelector('.expense-actions');
  const isOpen = actions.style.display !== 'none';
  document.querySelectorAll('.expense-actions').forEach(a => a.style.display = 'none');
  if (!isOpen) actions.style.display = 'flex';
}

function filterCat(cat) {
  filterCatActive = cat;
  renderHistory();
}

// STATS
function renderStats() {
  const me = getMonthExpenses();
  const total = me.reduce((s, e) => s + e.amount, 0);
  const totalBudget = Object.values(budgets).reduce((a, b) => a + b, 0);
  const maxCat = total > 0 ? Object.entries(
    me.reduce((acc, e) => { acc[e.category] = (acc[e.category]||0) + e.amount; return acc; }, {})
  ).sort((a,b) => b[1]-a[1])[0] : null;

  const catTotals = ['생필품','쇼핑','식료품'].map(cat => ({
    cat,
    amount: me.filter(e => e.category === cat).reduce((s,e) => s + e.amount, 0)
  }));
  const maxAmt = Math.max(...catTotals.map(c => c.amount), 1);

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-month-total">
      <div class="stat-card">
        <div class="stat-label">총 지출</div>
        <div class="stat-value">${total.toLocaleString()}원</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">예산 대비</div>
        <div class="stat-value" style="color:${total > totalBudget ? 'var(--danger)' : 'var(--point)'}">
          ${totalBudget > 0 ? Math.round(total/totalBudget*100) : 0}%
        </div>
      </div>
    </div>

    <div class="bar-chart">
      <div class="bar-chart-title">카테고리별 지출</div>
      ${catTotals.map(c => {
        const col = CAT_COLORS[c.cat];
        const pct = Math.round(c.amount / maxAmt * 100);
        return `<div class="bar-item">
          <div class="bar-label">${c.cat}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col.dot}"></div></div>
          <div class="bar-amount">${c.amount.toLocaleString()}원</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title" style="margin-top:8px">카테고리별 상세</div>
    <div class="monthly-list">
      ${catTotals.map(c => {
        const col = CAT_COLORS[c.cat];
        const cnt = me.filter(e => e.category === c.cat).length;
        const budget = budgets[c.cat] || 0;
        const over = c.amount > budget;
        return `<div class="monthly-item">
          <div class="monthly-item-left">
            <div class="monthly-dot" style="background:${col.dot}"></div>
            <div>
              <div class="monthly-name">${c.cat}</div>
              <div class="monthly-count">${cnt}건 · 예산 ${budget.toLocaleString()}원</div>
            </div>
          </div>
          <div class="monthly-amount" style="color:${over ? 'var(--danger)' : 'var(--text)'}">
            ${c.amount.toLocaleString()}원
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// SETTINGS
function renderSettings() {
  ['생필품','쇼핑','식료품'].forEach(cat => {
    const el = document.getElementById('budget-' + cat);
    if (el) el.value = budgets[cat] || '';
  });
}

async function saveBudgets() {
  ['생필품','쇼핑','식료품'].forEach(cat => {
    const v = parseInt(document.getElementById('budget-' + cat).value);
    if (!isNaN(v) && v > 0) budgets[cat] = v;
  });
  saveToLocal();
  renderAll();
  showToast('예산이 저장되었어요');
  try { await apiSaveBudget(budgets); } catch(e) {}
}

// MODAL
function openAddModal() {
  editingId = null;
  selectedCat = '생필품';
  document.getElementById('modal-title').textContent = '지출 추가';
  document.getElementById('form-submit-btn').textContent = '저장하기';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('form-date').value = today;
  document.getElementById('form-store').value = '';
  document.getElementById('form-item').value = '';
  document.getElementById('form-amount').value = '';
  document.getElementById('form-memo').value = '';
  document.querySelectorAll('.cat-select-btn').forEach((b,i) => b.classList.toggle('active', i === 0));
  document.getElementById('add-modal').classList.add('open');
}

function openEditModal(id) {
  const exp = expenses.find(e => e.id === id);
  if (!exp) return;
  editingId = id;
  selectedCat = exp.category;
  document.getElementById('modal-title').textContent = '지출 수정';
  document.getElementById('form-submit-btn').textContent = '수정하기';
  document.getElementById('form-date').value = exp.date;
  document.getElementById('form-store').value = exp.store;
  document.getElementById('form-item').value = exp.item;
  document.getElementById('form-amount').value = exp.amount;
  document.getElementById('form-memo').value = exp.memo || '';
  const cats = ['생필품','쇼핑','식료품'];
  document.querySelectorAll('.cat-select-btn').forEach((b,i) => b.classList.toggle('active', cats[i] === exp.category));
  document.getElementById('add-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function selectCat(cat, btn) {
  selectedCat = cat;
  document.querySelectorAll('.cat-select-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function submitExpense() {
  const date = document.getElementById('form-date').value;
  const store = document.getElementById('form-store').value.trim();
  const item = document.getElementById('form-item').value.trim();
  const amount = parseInt(document.getElementById('form-amount').value);
  const memo = document.getElementById('form-memo').value.trim();

  if (!date || !store || !item || isNaN(amount) || amount <= 0) {
    showToast('날짜, 구매처, 물품명, 금액을 입력해주세요');
    return;
  }

  const exp = { date, category: selectedCat, store, item, amount, memo };

  if (editingId) {
    const idx = expenses.findIndex(e => e.id === editingId);
    if (idx !== -1) expenses[idx] = { ...expenses[idx], ...exp };
    saveToLocal();
    renderAll();
    closeModal();
    showToast('수정되었어요');
    try { await apiUpdateExpense({ id: editingId, ...exp }); } catch(e) {}
  } else {
    const tempId = 'local-' + Date.now();
    expenses.push({ id: tempId, ...exp });
    saveToLocal();
    renderAll();
    closeModal();
    showToast('저장되었어요');
    try {
      const res = await apiAddExpense(exp);
      if (res.success && res.id) {
        const idx = expenses.findIndex(e => e.id === tempId);
        if (idx !== -1) expenses[idx].id = res.id;
        saveToLocal();
      }
    } catch(e) {}
  }
}

// DELETE
function askDelete(id) {
  deletingId = id;
  document.getElementById('confirm-modal').classList.add('open');
}

function closeConfirm() {
  deletingId = null;
  document.getElementById('confirm-modal').classList.remove('open');
}

async function confirmDelete() {
  if (!deletingId) return;
  const id = deletingId;
  expenses = expenses.filter(e => e.id !== id);
  saveToLocal();
  renderAll();
  closeConfirm();
  showToast('삭제되었어요');
  try { await apiDeleteExpense(id); } catch(e) {}
}

// NAV
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'stats') renderStats();
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// CLOSE MODAL ON OVERLAY CLICK
document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
